<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNA - The Cinematic Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-abyss: #020205;
            --luna-silver: #e2e8f0;
            --luna-glow: rgba(180, 200, 255, 0.4);
            --luna-accent: rgba(140, 160, 255, 0.8);
            --font-luxury: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; /* 全局隐藏原生鼠标 */ }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-abyss);
            overflow: hidden;
            font-family: var(--font-luxury);
            -webkit-font-smoothing: antialiased;
        }

        /* --- 自定义光标 (沿用并优化你的参考) --- */
        #cursor-dot {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: #fff; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff, 0 0 20px var(--luna-accent);
            transition: width 0.3s, height 0.3s;
        }
        #cursor-ring {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1), height 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-color 0.3s;
            mix-blend-mode: screen;
        }

        /* --- 动态星空画布 --- */
        #cosmos-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- 核心 UI 容器 (带视差倾斜) --- */
        #ui-layer {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        /* --- 极致复杂的中心 LUNA 元素 --- */
        .luna-astrolabe {
            position: relative; width: 220px; height: 220px; margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 1. 星轨环绕层 */
        .orbit-a { position: absolute; inset: -20px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.05); animation: spin 15s linear infinite; }
        .orbit-b { position: absolute; inset: -40px; border-radius: 50%; border: 1px dashed rgba(180, 200, 255, 0.1); animation: spin 25s linear infinite reverse; }
        .orbit-c { position: absolute; inset: -70px; border-radius: 50%; border: 0.5px solid rgba(255, 255, 255, 0.03); animation: spin 35s linear infinite; }
        
        .satellite { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #fff; box-shadow: 0 0 15px 5px var(--luna-accent); top: -2px; left: 50%; transform: translateX(-50%); }
        .orbit-b .satellite { width: 3px; height: 3px; background: #a0c0ff; top: 50%; right: -1.5px; left: auto; transform: translateY(-50%); }

        /* 2. 日冕/月蚀发光体 */
        .eclipse-core {
            position: absolute; width: 120px; height: 120px; border-radius: 50%;
            background: #000; /* 核心黑洞 */
            box-shadow: 
                inset -15px -15px 30px rgba(255,255,255,0.1), /* 内部月海反光 */
                0 0 50px 10px var(--luna-glow),
                0 0 100px 20px rgba(100, 140, 255, 0.2);
            animation: coreBreath 6s ease-in-out infinite alternate;
            overflow: hidden;
        }

        /* 液体金属流光扫过 */
        .eclipse-core::after {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
            animation: fluidSweep 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* 3. 悬浮几何月相 SVG */
        .moon-geometry {
            position: absolute; width: 140px; height: 140px; z-index: 2;
            animation: float 8s ease-in-out infinite;
        }

        /* 主标题美化：神圣、空灵、电影感 */
        .luna-title {
            font-family: 'Cinzel', serif; /* 使用 Cinzel 字体 */
            font-size: 5rem;
            font-weight: 400;
            text-transform: uppercase;
            
            /* 极致字间距：L U N A 之间的空气感 */
            letter-spacing: 2.5rem;
            padding-left: 2.5rem; /* 抵消右侧间距实现居中 */
            
            /* 高级感色调：冷银渐变 */
            background: linear-gradient(
                to bottom, 
                #ffffff 0%, 
                #cfd9df 50%, 
                #a1abb3 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            
            /* 柔和微光 */
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
            
            /* 进场动画：模糊淡入+间距收缩 */
            animation: lunaEntrance 4s cubic-bezier(0.19, 1, 0.22, 1) 2s forwards;
            opacity: 0;
        }

        /* 副标题美化：极简、现代 */
        .luna-tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 100;
            font-size: 0.7rem;
            letter-spacing: 0.8rem;
            padding-left: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
        }

        /* --- 沉浸式交互按钮 --- */
        .enter-portal {
            position: relative; pointer-events: all; cursor: none;
            width: 200px; height: 50px; display: flex; align-items: center; justify-content: center;
        }
        
        .portal-ring {
            position: absolute; inset: 0; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .portal-glow {
            position: absolute; inset: 0; border-radius: 100px; background: var(--luna-glow);
            filter: blur(15px); opacity: 0; transition: opacity 0.5s ease;
        }

        .enter-text {
            font-size: 0.8rem; font-weight: 400; letter-spacing: 0.5rem; padding-left: 0.5rem;
            color: rgba(255, 255, 255, 0.5); z-index: 2; transition: color 0.3s ease;
        }

        .enter-portal:hover .portal-ring { transform: scale(1.05); border-color: rgba(255, 255, 255, 0.8); box-shadow: 0 0 20px rgba(255,255,255,0.2) inset; }
        .enter-portal:hover .portal-glow { opacity: 1; }
        .enter-portal:hover .enter-text { color: #fff; text-shadow: 0 0 10px #fff; }

        /* --- 底部防伪/年份标识 --- */
        .footer-mark {
            position: absolute; bottom: 30px; display: flex; align-items: center; gap: 15px;
            opacity: 0.3; pointer-events: none;
        }
        .footer-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #fff, transparent); }
        .footer-text { font-size: 0.6rem; letter-spacing: 4px; color: #fff; }

        /* --- 电影级进场动画时间轴 (Timeline) --- */
        .luna-astrolabe { opacity: 0; animation: cinematicReveal 4s cubic-bezier(0.19, 1, 0.22, 1) 1s forwards; }
        .luna-title { opacity: 0; transform: translateY(30px); filter: blur(10px); animation: titleRise 3s cubic-bezier(0.19, 1, 0.22, 1) 3s forwards; }
        .luna-tagline { opacity: 0; transform: translateY(20px); filter: blur(5px); animation: titleRise 3s cubic-bezier(0.19, 1, 0.22, 1) 4.5s forwards; }
        .enter-portal { opacity: 0; animation: fadeUp 2s ease forwards 6.5s; }
        .footer-mark { opacity: 0; animation: fadeUp 2s ease forwards 7.5s; }

        @keyframes cinematicReveal {
            0% { opacity: 0; transform: scale(0.6) rotate(-45deg); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
        }
        @keyframes titleRise { to { opacity: 1; transform: translateY(0); filter: blur(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes coreBreath { 0% { box-shadow: inset -15px -15px 30px rgba(255,255,255,0.05), 0 0 40px 5px var(--luna-glow); } 100% { box-shadow: inset -15px -15px 30px rgba(255,255,255,0.2), 0 0 80px 20px var(--luna-accent); } }
        @keyframes fluidSweep { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }

        /* 过场白屏/黑幕 */
        #warp-flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.8s cubic-bezier(0.8, 0, 0.2, 1); }
        #warp-dark { position: absolute; inset: 0; background: #000; opacity: 0; pointer-events: none; z-index: 1000; transition: opacity 1.5s ease; }

/* --- 手机端专项适配 (屏幕宽度小于 768px) --- */
@media (max-width: 768px) {
    /* 标题：缩小字号，字间距从 2.5rem 缩减到更灵动的 1.2rem */
    .luna-title {
        font-size: 10vw; /* 随屏幕宽度自动缩放 */
        letter-spacing: 1.2rem;
        padding-left: 1.2rem; /* 保持居中修正 */
        margin-bottom: 5px;
        white-space: nowrap; /* 强制不换行，保证排版完整 */
    }

    /* Tagline：Architect Of The Digital Void */
    .luna-tagline {
        font-size: 2vw; /* 极细小字 */
        letter-spacing: 0.3rem;
        padding-left: 0.3rem;
        width: 90%; /* 限制宽度，防止贴边 */
        text-align: center;
        line-height: 1.5;
        margin-bottom: 40px;
        /* 如果文字还是太长，可以尝试取消大写或进一步缩小 */
    }

    /* 调整中心元素大小，为文字腾出纵向空间 */
    .luna-astrolabe {
        width: 160px;
        height: 160px;
        margin-bottom: 20px;
    }

    /* 按钮在手机端适当缩小，方便点击且不突兀 */
    .enter-portal {
        width: 160px;
        height: 44px;
    }
}

/* --- 1. 调整 UI 层整体布局 --- */
#ui-layer {
    position: absolute; 
    inset: 0;
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    z-index: 10; 
    pointer-events: none;
    
    /* 核心修改：利用 gap 统一控制所有直系子元素的间距 */
    gap: 2.5rem; 
}

/* --- 2. 针对各元素的精准间距微调 --- */

.luna-astrolabe {
    /* 增加 Logo 下方的间距，让它像悬浮在宇宙中心 */
    margin-bottom: 2rem; 
}

.luna-title {
    /* 标题和副标题之间不需要太大间距，保持关联感 */
    margin-bottom: 0.5rem; 
}

.luna-tagline {
    /* 副标题和按钮之间是视觉断层，增加间距产生“空灵感” */
    margin-bottom: 5rem; 
}

/* --- 3. 手机端专项适配 (最关键的间距调整) --- */
@media (max-width: 768px) {
    #ui-layer {
        /* 手机屏窄长，间距要按比例调整 */
        gap: 1.5rem; 
    }

    .luna-astrolabe {
        width: 150px; /* 缩小 Logo */
        height: 150px;
        margin-bottom: 1.5rem;
    }

    .luna-tagline {
        /* 手机端按钮位置可以稍微靠下一些 */
        margin-bottom: 15vh; 
        width: 80%;
        line-height: 1.8;
    }
    
    /* 针对手机端文字美化，防止换行太挤 */
    .luna-title {
        font-size: 11vw;
        letter-spacing: 1rem;
        padding-left: 1rem;
    }
}
    </style>
</head>
<body>

    <canvas id="cosmos-canvas"></canvas>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div id="ui-layer">
        
        <div class="luna-astrolabe">
            <div class="orbit-c"></div>
            <div class="orbit-b"><div class="satellite"></div></div>
            <div class="orbit-a"><div class="satellite"></div></div>
            
            <div class="eclipse-core"></div>
            
            <svg class="moon-geometry" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.9)" />
                        <stop offset="100%" stop-color="rgba(255,255,255,0.0)" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" stroke-dasharray="4 4"/>
                <path d="M 100 30 A 70 70 0 1 1 30 100 A 50 50 0 1 0 100 30 Z" fill="url(#moonGrad)" filter="drop-shadow(0 0 10px rgba(255,255,255,0.5))"/>
                <circle cx="100" cy="100" r="2" fill="#fff" />
            </svg>
        </div>

        <h1 class="luna-title">LUNA</h1>
        <div class="luna-tagline">Architect Of The Digital Void</div>

        <div class="enter-portal" id="btn-enter" onclick="warpToLuneOS()">
            <div class="portal-glow"></div>
            <div class="portal-ring"></div>
            <span class="enter-text">AWAKEN</span>
        </div>
    </div>

    <div class="footer-mark">
        <div class="footer-line"></div>
        <div class="footer-text">LUNE OS · 2026</div>
        <div class="footer-line"></div>
    </div>

    <div id="warp-flash"></div>
    <div id="warp-dark"></div>

    <script>
        // ==========================================
        // 1. 光标逻辑 & UI 视差 (保留并优化交互手感)
        // ==========================================
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        const uiLayer = document.getElementById('ui-layer');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let ringX = mouseX, ringY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';

            // UI 微妙视差倾斜 (高级感来源之一)
            const tiltX = (window.innerHeight / 2 - mouseY) / 60;
            const tiltY = (mouseX - window.innerWidth / 2) / 60;
            uiLayer.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        function lerpCursor() {
            ringX += (mouseX - ringX) * 0.15; // 丝滑延迟
            ringY += (mouseY - ringY) * 0.15;
            cursorRing.style.left = ringX + 'px';
            cursorRing.style.top = ringY + 'px';
            requestAnimationFrame(lerpCursor);
        }
        lerpCursor();

        // 按钮 Hover 光标放大
        const btnEnter = document.getElementById('btn-enter');
        btnEnter.addEventListener('mouseenter', () => {
            cursorRing.style.width = '80px'; cursorRing.style.height = '80px';
            cursorRing.style.borderColor = 'rgba(255, 255, 255, 0.8)';
            cursorDot.style.transform = 'translate(-50%, -50%) scale(0)'; // 隐藏中心点
        });
        btnEnter.addEventListener('mouseleave', () => {
            cursorRing.style.width = '40px'; cursorRing.style.height = '40px';
            cursorRing.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // ==========================================
        // 2. 核心 Canvas: 宇宙、流星与涟漪 (满血重构)
        // ==========================================
        const canvas = document.getElementById('cosmos-canvas');
        const ctx = canvas.getContext('2d');
        let cw, ch;

        function resizeCanvas() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 实体库 ---
        const stars = [];
        const meteors = [];
        const ripples = [];

        // 初始化繁星 (带深度视差)
        for (let i = 0; i < 350; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.5,
                baseAlpha: Math.random() * 0.5 + 0.1,
                blinkSpeed: Math.random() * 0.02 + 0.005,
                angle: Math.random() * Math.PI * 2,
                depth: Math.random() * 0.5 + 0.1 // 视差深度
            });
        }

        // 生成流星
        function shootMeteor() {
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.2; // 统一倾斜角度落入
            meteors.push({
                x: Math.random() * cw * 1.5 - cw * 0.2,
                y: -50,
                vx: Math.cos(angle) * (8 + Math.random() * 10),
                vy: Math.sin(angle) * (8 + Math.random() * 10),
                length: 100 + Math.random() * 200,
                thickness: Math.random() * 1.5 + 0.5,
                life: 1,
                decay: 0.01 + Math.random() * 0.015
            });
        }
        // 自动流星控制
        setInterval(() => { if(Math.random() > 0.3) shootMeteor(); }, 2000);
        setTimeout(shootMeteor, 1000); setTimeout(shootMeteor, 2500);

        // 点击产生声纳水纹
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#btn-enter')) return;
            ripples.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 0.8, thickness: 2 });
            shootMeteor(); // 每次点击召唤一颗流星
        });

        // --- 渲染循环 ---
        let time = 0;
        let isWarping = false; // 用于控制跳转时的曲率加速

        function renderCosmos() {
            // 保留极淡的拖影制造运动模糊
            ctx.fillStyle = isWarping ? 'rgba(0, 0, 0, 0.1)' : 'rgba(2, 2, 5, 0.3)';
            ctx.fillRect(0, 0, cw, ch);
            time++;

            // 1. 画星星
            stars.forEach(s => {
                s.angle += s.blinkSpeed;
                const currentAlpha = s.baseAlpha + Math.sin(s.angle) * 0.3;
                
                // 鼠标视差移动
                let px = s.x + (mouseX - cw/2) * s.depth * 0.05;
                let py = s.y + (mouseY - ch/2) * s.depth * 0.05;
                
                // 跳转时的曲率拉伸
                if (isWarping) {
                    s.y += s.depth * 20; // 星星快速下落
                    if (s.y > ch) s.y = 0;
                    py = s.y;
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(px, py - 50 * s.depth);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${currentAlpha})`;
                    ctx.lineWidth = s.r;
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(px, py, Math.max(0.1, s.r), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(220, 230, 255, ${Math.max(0, currentAlpha)})`;
                    ctx.fill();
                }
            });

            // 2. 画流星
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                const grad = ctx.createLinearGradient(m.x, m.y, m.x - Math.cos(Math.atan2(m.vy, m.vx))*m.length, m.y - Math.sin(Math.atan2(m.vy, m.vx))*m.length);
                grad.addColorStop(0, `rgba(255, 255, 255, ${m.life})`);
                grad.addColorStop(0.1, `rgba(180, 200, 255, ${m.life * 0.8})`);
                grad.addColorStop(1, 'rgba(100, 120, 255, 0)');

                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - Math.cos(Math.atan2(m.vy, m.vx)) * m.length, m.y - Math.sin(Math.atan2(m.vy, m.vx)) * m.length);
                ctx.strokeStyle = grad;
                ctx.lineWidth = m.thickness;
                ctx.stroke();

                // 头部高光点
                ctx.beginPath(); ctx.arc(m.x, m.y, m.thickness * 1.5, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${m.life})`; ctx.fill();

                m.x += m.vx; m.y += m.vy; m.life -= m.decay;
                if (m.life <= 0 || m.x > cw * 1.2 || m.y > ch * 1.2) meteors.splice(i, 1);
            }

            // 3. 画点击涟漪
            for (let i = ripples.length - 1; i >= 0; i--) {
                const r = ripples[i];
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(180, 200, 255, ${r.alpha})`;
                ctx.lineWidth = r.thickness;
                ctx.stroke();
                
                r.radius += 4;
                r.alpha -= 0.015;
                r.thickness += 0.05;
                if (r.alpha <= 0) ripples.splice(i, 1);
            }

            requestAnimationFrame(renderCosmos);
        }
        renderCosmos();

        // ==========================================
        // 3. 史诗级进场 & 终极跳转 (Warp Dive)
        // ==========================================
        function warpToLuneOS() {
            if (isWarping) return;
            isWarping = true;

            const flash = document.getElementById('warp-flash');
            const dark = document.getElementById('warp-dark');
            const astrolabe = document.querySelector('.luna-astrolabe');
            const texts = document.querySelectorAll('.luna-title, .luna-tagline, .enter-portal, .footer-mark');

            // UI 迅速后退消散
            texts.forEach(el => { el.style.transition = 'all 0.5s ease'; el.style.opacity = '0'; el.style.transform = 'translateY(-20px) scale(0.9)'; });
            astrolabe.style.transition = 'all 1s cubic-bezier(0.8, 0, 0.2, 1)';
            astrolabe.style.transform = 'scale(5) rotate(90deg)';
            astrolabe.style.opacity = '0';

            // 满屏流星暴雨
            for(let i=0; i<15; i++) { setTimeout(shootMeteor, i*50); }

            // 强光闪烁
            setTimeout(() => { flash.style.opacity = '1'; }, 400);
            
            // 黑幕遮盖，准备跳转
            setTimeout(() => { 
                flash.style.opacity = '0'; 
                dark.style.opacity = '1'; 
            }, 800);

            // 最终跳转
            setTimeout(() => {
                window.location.href = "zhuji.html"; // 你的目标页面
            }, 2000);
        }

    </script>
</body>
